name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create archive
        run: |
          ARCHIVE="${{ github.event.repository.name }}-${{ github.ref_name }}.zip"
          cd mod
          zip -r "../$ARCHIVE" .
          cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
